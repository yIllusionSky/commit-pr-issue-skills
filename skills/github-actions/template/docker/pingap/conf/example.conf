name = "app-gateway"
threads = 0
log_level = "INFO"

[upstreams.backend]
addrs = ["backend:8080"]
health_check = "http://backend:8080/health"

[upstreams.frontend]
addrs = ["frontend:3000"]

[locations.api]
path = "/api"
upstream = "backend"
rewrite = "^/api/(.*) /$1"
enable_reverse_proxy_headers = true

[locations.frontend]
path = "/"
upstream = "frontend"
enable_reverse_proxy_headers = true

[servers.http]
addr = "0.0.0.0:80"
locations = ["api", "frontend"]
